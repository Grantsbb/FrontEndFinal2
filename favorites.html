<h1 class="text-center">Favorites</h1>
<section class="container my-5">
  <div class="row g-4" id="seasonal-cards"></div>
</section>

<script src="script.js"></script>
<script>
async function loadFavorites() {
  const favs = getFavorites();
  const container = document.getElementById('seasonal-cards');
  if (favs.length === 0) {
    container.innerHTML = '<p class="text-center">No favorites yet. Heart a recipe to save it here.</p>';
    return;
  }
  let recipes = [];
  try {
    const res = await fetch('recipes.json');
    recipes = await res.json();
  } catch (e) { return; }

  const favorited = recipes.filter(r => favs.includes(String(r.id)));
  container.innerHTML = favorited.map(recipe => {
    const image = recipe.images && recipe.images[0] ? `dataset/image_files/${recipe.images[0]}` : '';
    const imgTag = image ? `<img src="${image}" class="card-img-top" alt="${recipe.name}">` : '';
    return `
      <div class="col-md-4">
        <div class="card h-100">
          ${imgTag}
          <div class="card-body">
            <h5 class="card-title">${recipe.name}</h5>
            <p class="card-text">
              <strong>Cuisine:</strong> ${recipe.cuisine}<br>
              <strong>Prep Time:</strong> ${recipe.prep_time}<br>
              <strong>Difficulty:</strong> ${recipe.difficulty}
            </p>
            <a href="recipe-detail.html?id=${recipe.id}" class="btn">View Recipe</a>
            <span class="heart-btn" id="heart-${recipe.id}" onclick="toggleFavorite(${recipe.id})">♥</span>
          </div>
        </div>
      </div>`;
  }).join('');
}
loadFavorites();
</script>
</body>

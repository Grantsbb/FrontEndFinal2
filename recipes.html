<div id="cooking-timer">
  <div class="timer-inputs">
    <input type="number" id="t-min" min="0" max="99" value="5" />
    <span>:</span>
    <input type="number" id="t-sec" min="0" max="59" value="0" />
  </div>
  <div class="timer-display">05:00</div>
  <div class="timer-btns">
    <button id="t-start">Start</button>
    <button id="t-pause">Pause</button>
    <button id="t-reset">Reset</button>
  </div>
  <div class="timer-status"></div>
</div>
<script src="timer.js"></script>

<body>
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Nano's Bytes Monthly</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="recipes.html">Recipes</a></li>
        <li class="nav-item"><a class="nav-link" href="favorites.html">Favorites</a></li>
        <li class="nav-item"><a class="nav-link" href="recipesubmission.html">Share Your Recipes!</a></li>
        <li class="switch">
          <input type="checkbox" id="lightdarkmode">
          <label class="slider round" for="lightdarkmode"></label>
        </li>
      </ul>

  </div>
</nav>

<div class="container my-3">
  <input type="search" id="searchBar" class="form-control mb-2" placeholder="Search recipes by name or ingredient...">
  <div class="d-flex flex-wrap gap-2">
    <select id="filterSeason" class="form-select w-auto">
      <option value="">All Seasons</option>
      <option value="Spring">Spring</option>
      <option value="Summer">Summer</option>
      <option value="Autumn">Autumn</option>
      <option value="Winter">Winter</option>
      <option value="All">All Year</option>
    </select>
    <select id="filterCategory" class="form-select w-auto">
      <option value="">All Categories</option>
      <option value="Breakfast">Breakfast</option>
      <option value="Lunch">Lunch</option>
      <option value="Dinner">Dinner</option>
      <option value="Desserts">Desserts</option>
      <option value="Snacks">Snacks</option>
      <option value="Beverages">Beverages</option>
      <option value="Appetizers">Appetizers</option>
    </select>
    <select id="filterCuisine" class="form-select w-auto">
      <option value="">All Cuisines</option>
    </select>
 
<div class="d-flex flex-wrap gap-2 mt-2 align-items-center">
  <label class="me-1">Sort by:</label>
  <select id="sortBy" class="form-select w-auto">
    <option value="">None</option>
    <option value="name">Name (A–Z)</option>
    <option value="difficulty">Difficulty</option>
    <option value="prep_time">Prep Time</option>
  </select>

  <label class="ms-3 me-1">Dietary:</label>
  <select id="filterDietary" class="form-select w-auto">
    <option value="">Any</option>
    <option value="Vegetarian">Vegetarian</option>
    <option value="Vegan">Vegan</option>
    <option value="Gluten-Free">Gluten-Free</option>
    <option value="High-Protein">High-Protein</option>
  </select>

  <label class="ms-3 me-1">Difficulty:</label>
  <select id="filterDifficulty" class="form-select w-auto">
    <option value="">Any</option>
    <option value="Easy">Easy</option>
    <option value="Moderate">Moderate</option>
  </select>
</div>
  </div>
</div>

<h1 class="text-center">All Recipes</h1>
<section class="container my-5">
  <div class="row g-4" id="seasonal-cards"></div>
</section>

<script src="script.js"></script>
<script>
let allRecipes = [];

async function loadSeasonalPage() {
  try {
    const res = await fetch('recipes.json');
    allRecipes = await res.json();
  } catch (e) { return; }

  const cuisines = [...new Set(allRecipes.map(r => r.cuisine))].sort();
  const cuisineSelect = document.getElementById('filterCuisine');
  cuisines.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    cuisineSelect.appendChild(opt);
  });
  const userRecipes = JSON.parse(localStorage.getItem('submittedrecipes') || '[]');
  allRecipes = [...allRecipes, ...userRecipes];
  renderCards(allRecipes);
  
}

function renderCards(recipes) {
  const container = document.getElementById('seasonal-cards');
  if (recipes.length === 0) {
    container.innerHTML = '<p class="text-center">No recipes found.</p>';
    return;
  }
  const favs = getFavorites();
  container.innerHTML = recipes.map(recipe => {
    const image = recipe.images && recipe.images[0]
    ? (recipe.images[0].startsWith('data:') ? recipe.images[0] : `dataset/image_files/${recipe.images[0]}`)                                                
    : '';                                                                                                                                                
    const imgTag = image ? `<img src="${image}" class="card-img-top" alt="${recipe.name}">` : '';
    const isFav = favs.includes(String(recipe.id));
    return `
      <div class="col-md-4">
        <div class="card h-100">
          ${imgTag}
          <div class="card-body">
            <h5 class="card-title">${recipe.name}</h5>
            <p class="card-text">
              <strong>Cuisine:</strong> ${recipe.cuisine}<br>
              <strong>Prep Time:</strong> ${recipe.prep_time}<br>
              <strong>Difficulty:</strong> ${recipe.difficulty}
            </p>
            <a href="recipe-detail.html?id=${recipe.id}" class="btn">View Recipe</a>
            <span class="heart-btn" id="heart-${recipe.id}" onclick="toggleFavorite(${recipe.id})">${isFav ? '♥' : '♡'}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

const DIFFICULTY_ORDER = { 'Easy': 1, 'Moderate': 2, 'Hard': 3 };

function parsePrepMinutes(prepStr) {
  const match = prepStr.match(/(\d+)/);
  return match ? parseInt(match[1]) : 999;
}

function applyFilters() {
  const query = document.getElementById('searchBar').value.toLowerCase();
  const season = document.getElementById('filterSeason').value;
  const category = document.getElementById('filterCategory').value;
  const cuisine = document.getElementById('filterCuisine').value;
  const dietary = document.getElementById('filterDietary').value;
  const difficulty = document.getElementById('filterDifficulty').value;
  const sortBy = document.getElementById('sortBy').value;

  let filtered = allRecipes.filter(recipe => {
    const nameMatch = recipe.name.toLowerCase().includes(query);
    const ingredientMatch = recipe.ingredients.some(i => i.toLowerCase().includes(query));
    const textMatch = nameMatch || ingredientMatch;

    const seasonMatch = !season || recipe.season === season || recipe.season === 'All';
    const categoryMatch = !category || recipe.category === category;
    const cuisineMatch = !cuisine || recipe.cuisine === cuisine;
    const dietaryMatch = !dietary || (recipe.dietary && recipe.dietary.includes(dietary));
    const difficultyMatch = !difficulty || recipe.difficulty === difficulty;

    return textMatch && seasonMatch && categoryMatch && cuisineMatch && dietaryMatch && difficultyMatch;
  });

  if (sortBy === 'name') {
    filtered.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sortBy === 'difficulty') {
    filtered.sort((a, b) => (DIFFICULTY_ORDER[a.difficulty] || 9) - (DIFFICULTY_ORDER[b.difficulty] || 9));
  } else if (sortBy === 'prep_time') {
    filtered.sort((a, b) => parsePrepMinutes(a.prep_time) - parsePrepMinutes(b.prep_time));
  }

  renderCards(filtered);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchBar').addEventListener('input', applyFilters);
  document.getElementById('filterSeason').addEventListener('change', applyFilters);
  document.getElementById('filterCategory').addEventListener('change', applyFilters);
  document.getElementById('filterCuisine').addEventListener('change', applyFilters);
});

loadSeasonalPage();
</script>
</body>

  <small>Nano's Bytes Monthly &mdash; Team 4 &mdash;

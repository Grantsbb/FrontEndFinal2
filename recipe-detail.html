      async function loadRecipeDetail() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const container = document.getElementById("recipe-detail-content");

        if (!id) {
          container.innerHTML = "<p>No recipe specified.</p>";
          return;
        }

        let recipes = [];
        try {
          const res = await fetch("recipes.json");
          recipes = await res.json();
        } catch (e) {
          container.innerHTML = "<p>Could not load recipes.</p>";
          return;
        }

        let recipe = recipes.find((r) => String(r.id) === String(id));
        if (!recipe) {
    const submitted = JSON.parse(localStorage.getItem('submittedrecipes') || '[]');
    recipe = submitted.find((r) => String(r.id) === String(id));
  }

  if (!recipe) {
    container.innerHTML = "<p>Recipe not found.</p>";
    return;
  }

        document.title = recipe.name + " — Nano's Bytes Monthly";

        const image =
          recipe.images && recipe.images[0]
            ? `dataset/image_files/${recipe.images[0]}`
            : "";
        const imgTag = image
          ? `<img src="${image}" class="recipe-picture img-fluid mb-4" alt="${recipe.name}">`
          : "";

        const ingredientsList = Array.isArray(recipe.ingredients)
          ? recipe.ingredients.map((i) => `<li>${i}</li>`).join("")
          : "<li>No ingredients listed.</li>";

        const stepsList = Array.isArray(recipe.steps)
          ? recipe.steps.map((s) => `<li>${s}</li>`).join("")
          : "<li>No steps listed.</li>";

        container.innerHTML = `
    <h1>${recipe.name}</h1>
    ${imgTag}
    <ul class="list-unstyled mb-3">
      <li><strong>Season:</strong> ${recipe.season}</li>
      <li><strong>Cuisine:</strong> ${recipe.cuisine}</li>
      <li><strong>Prep Time:</strong> ${recipe.prep_time}</li>
      <li><strong>Difficulty:</strong> ${recipe.difficulty}</li>
    </ul>
    
      
      <button class="btn mb-3" id="add-to-shopping-btn">Add Ingredients to Shopping List</button>
      <div id="shopping-list-section" style="display:none;" class="mb-4">
        <h2>Shopping List</h2>
        <ul id="shopping-list-items" class="list-unstyled"></ul>
        <button class="btn mt-2" id="clear-shopping-btn">Clear List</button>
      </div>
      <h2>Instructions</h2>
    <ul id="ingredients-list">${ingredientsList}</ul>

    <input class="form-control form-control-sm w-25" type="text" placeholder="Multiply here" aria-label=".form-control-sm example">
    </div>

    <div class="switch">                                                                                     
      <input type="checkbox" id="interactivechecklist" checked>                                                      
      <label class="slider round" for="interactivechecklist"></label>
    </div>

  </div>
    
    <h2>Instructions</h2>
    <ol>${stepsList}</ol>
    <a href="javascript:history.back()" class="btn">Back</a>
  `;
      }

      
      
      async function rendermultchecklist() {
// kill lines 161-239 in case checklist explodes lol        
function loadShoppingList() {
  return JSON.parse(localStorage.getItem('shoppingList') || '[]');
}

function saveShoppingList(list) {
  localStorage.setItem('shoppingList', JSON.stringify(list));
}

function renderShoppingList() {
  const list = loadShoppingList();
  const ul = document.getElementById('shopping-list-items');
  if (!ul) return;

  if (list.length === 0) {
    ul.innerHTML = '<li>No items.</li>';
    return;
  }

  ul.innerHTML = list.map((item, i) => `
    <li style="display:flex; align-items:center; gap:8px; margin-bottom:6px; ${item.purchased ? 'opacity:0.5;text-decoration:line-through;' : ''}">
      <input type="checkbox" ${item.purchased ? 'checked' : ''} onchange="togglePurchased(${i})">
      <span>${item.text}</span>
      <button onclick="removeShoppingItem(${i})" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:1rem;">🗑️</button>
    </li>
  `).join('');
}

function togglePurchased(index) {
  const list = loadShoppingList();
  list[index].purchased = !list[index].purchased;
  saveShoppingList(list);
  renderShoppingList();
}

function removeShoppingItem(index) {
  const list = loadShoppingList();
  list.splice(index, 1);
  saveShoppingList(list);
  renderShoppingList();
}

const origRender = rendermultchecklist;
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const addBtn = document.getElementById('add-to-shopping-btn');
    const clearBtn = document.getElementById('clear-shopping-btn');
    const section = document.getElementById('shopping-list-section');

    if (addBtn) {
      addBtn.addEventListener('click', () => {
        const items = [...document.querySelectorAll('#ingredients-list li')].map(li => {
          const label = li.querySelector('label');
          return { text: label ? label.textContent : li.textContent, purchased: false };
        });
        const list = loadShoppingList();
        items.forEach(item => {
        list.push(item);
        });
        saveShoppingList(list);
        section.style.display = '';
        renderShoppingList();
      });
    }

    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        saveShoppingList([]);
        renderShoppingList();
      });
    }

    const existing = loadShoppingList();
    if (existing.length > 0 && section) {
      section.style.display = '';
      renderShoppingList();
    }
  }, 600);
});

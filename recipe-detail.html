  <body>

    <section class="container my-5" id="recipe-detail-content">
      <p class="text-center">Loading recipe...</p>
      
    </section>

    <script src="script.js"></script>
    <script>
      async function loadRecipeDetail() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const container = document.getElementById("recipe-detail-content");

        if (!id) {
          container.innerHTML = "<p>No recipe specified.</p>";
          return;
        }

        let recipes = [];
        try {
          const res = await fetch("recipes.json");
          recipes = await res.json();
        } catch (e) {
          container.innerHTML = "<p>Could not load recipes.</p>";
          return;
        }

        const recipe = recipes.find((r) => String(r.id) === String(id));
        if (!recipe) {
          container.innerHTML = "<p>Recipe not found.</p>";
          return;
        }

        document.title = recipe.name + " — Nano's Bytes Monthly";

        const image =
          recipe.images && recipe.images[0]
            ? `dataset/image_files/${recipe.images[0]}`
            : "";
        const imgTag = image
          ? `<img src="${image}" class="recipe-picture img-fluid mb-4" alt="${recipe.name}">`
          : "";

        const ingredientsList = Array.isArray(recipe.ingredients)
          ? recipe.ingredients.map((i) => `<li>${i}</li>`).join("")
          : "<li>No ingredients listed.</li>";

        const stepsList = Array.isArray(recipe.steps)
          ? recipe.steps.map((s) => `<li>${s}</li>`).join("")
          : "<li>No steps listed.</li>";

        container.innerHTML = `
    <h1>${recipe.name}</h1>
    ${imgTag}
    <ul class="list-unstyled mb-3">
      <li><strong>Season:</strong> ${recipe.season}</li>
      <li><strong>Cuisine:</strong> ${recipe.cuisine}</li>
      <li><strong>Prep Time:</strong> ${recipe.prep_time}</li>
      <li><strong>Difficulty:</strong> ${recipe.difficulty}</li>
    </ul>
    <h2>Ingredients</h2>
    <ul id="ingredients-list">${ingredientsList}</ul>

    <div class="container my-3">
    <input class="form-control form-control-sm w-25" type="text" placeholder="Multiply here" aria-label=".form-control-sm example">
    </div>
    <div style="display:flex; align-items:center; gap:10px;">                                                  
    <div class="switch">                                                                                     
      <input type="checkbox" id="interactivechecklist" checked>                                                      
      <label class="slider round" for="interactivechecklist"></label>
    </div>
    <span>Interactive Checklist</span>
  </div>
    
    <h2>Instructions</h2>
    <ol>${stepsList}</ol>
    <a href="javascript:history.back()" class="btn">Back</a>
  `;
      }

      
      
      async function rendermultchecklist() {
        await loadRecipeDetail();
        document.querySelectorAll('#ingredients-list li').forEach(li => {
      const label = document.createElement('label');
      label.textContent = li.textContent;
       const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      li.textContent = '';
      li.appendChild(checkbox);
      li.appendChild(label);
      })
      document.querySelector('#interactivechecklist').addEventListener('change', function () {                   
    if (this.checked) {                                                                                      
      document.querySelectorAll('#ingredients-list li').forEach(li => {                                      
        const label = document.createElement('label');                                                       
        label.textContent = li.dataset.original;                                                             
        const checkbox = document.createElement('input');                                                    
        checkbox.type = 'checkbox';                                                                          
        li.textContent = '';                                                                                 
        li.appendChild(checkbox);                           
        li.appendChild(label);
      });
    } else {
      document.querySelectorAll('#ingredients-list li').forEach(li => {
        li.textContent = li.dataset.original;
      });
    }
  });

        document.querySelectorAll('#ingredients-list li').forEach(li => {
          li.dataset.original = li.textContent;
        });

        document.querySelector('.form-control-sm').addEventListener('input', function () {
          const mult = parseFloat(this.value);
          document.querySelectorAll('#ingredients-list li').forEach(li => {
            if (!isNaN(mult) && mult > 0) {
              li.querySelector('label').textContent = li.dataset.original.replace(/^\d+\.?\d*/, n => +(parseFloat(n) * mult).toFixed(2));
            } else {
              li.querySelector('label').textContent = li.dataset.original;
            }
          });
        });
      }

      rendermultchecklist();


    </script>
